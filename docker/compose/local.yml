services:

  db:
    image: postgres:15
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ota_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ../../
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DEBUG: "True"
      SECRET_KEY: "change-me-local-dev"
      POSTGRES_DB: ota_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    command: python manage.py migrate --noinput
    restart: "no"

  web:
    build:
      context: ../../
      dockerfile: Dockerfile
    volumes:
      - ../../:/app
      - media_data:/app/media
    ports:
      - "8003:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DEBUG: "True"
      SECRET_KEY: "change-me-local-dev"
      POSTGRES_DB: ota_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    command: python manage.py runserver 0.0.0.0:8000
    restart: unless-stopped

volumes:
  postgres_data:
  media_data: