{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OTA Dashboard{% endblock %}</title>
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'dashboard/css/style.css' %}">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="ph-fill ph-rocket-launch"></i>
                OTA Portal
            </div>
            <nav class="sidebar-nav">
                <a href="{% url 'admin:index' %}" class="nav-item {% if request.resolver_match.url_name == 'index' %}active{% endif %}">
                    <i class="ph ph-squares-four"></i>
                    Dashboard
                </a>
                <a href="{% url 'admin:index' %}" class="nav-item">
                    <i class="ph ph-app-window"></i>
                    Apps
                </a>
                <a href="{% url 'admin:ui_app_create' %}" class="nav-item highlight">
                    <i class="ph ph-plus"></i>
                    Create App
                </a>
            </nav>
        </aside>

        <!-- Main Content Wrapper -->
        <main class="main-wrapper">
            <!-- Topbar -->
            <header class="topbar">
                <div class="page-title">
                    {% block page_title %}Dashboard{% endblock %}
                </div>
                <div class="user-profile">
                    <span>Admin User</span>
                    <div class="avatar">
                        <i class="ph ph-user"></i>
                    </div>
                </div>
            </header>

            <!-- Content Area -->
            <div class="content-area">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
                            <i class="ph {% if message.tags == 'error' %}ph-warning-circle{% else %}ph-check-circle{% endif %}"></i>
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Custom JS -->
    <script src="{% static 'dashboard/js/app.js' %}"></script>
</body>
</html>
